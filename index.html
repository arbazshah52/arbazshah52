    /* dark overlay on entire page so text is always readable */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(2, 11, 24, 0.82);
      z-index: -1;
    }

    #root {
      min-height: 100vh;
    }

    /* CURSOR */
    #cur {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s;
      mix-blend-mode: screen;
    }

    #cur-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: all 0.06s;
      opacity: 0.5;
    }

    /* SCROLL BAR */
    #sbar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--red));
      z-index: 300;
      transition: width 0.05s;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      }

      50% {
        box-shadow: 0 0 50px rgba(0, 212, 255, 0.7);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-14px);
      }
    }

    @keyframes scanline {
      0% {
        top: -5%;
      }

      100% {
        top: 105%;
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.5;
      }

      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @keyframes typing {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glowPulse {

      0%,
      100% {
        text-shadow: 0 0 10px var(--accent);
      }

      50% {
        text-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent);
      }
    }

    /* TOP CONTACT BAR */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(0, 212, 255, 0.06);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 0.35rem 3rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2rem;
    }

    .top-contact {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.3s;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.05em;
    }

    .top-contact:hover {
      color: var(--accent);
    }

    .top-contact span {
      font-size: 0.85rem;
    }

    /* NAV — below top bar */
    .nav {
      position: fixed;
      top: 32px;
      left: 0;
      right: 0;
      z-index: 190;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 3rem;
      background: rgba(2, 11, 24, 0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px var(--accent);
      animation: glowPulse 3s ease-in-out infinite;
    }

    .nav-links {
      display: flex;
      gap: 1.8rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--gray);
      font-size: 0.72rem;
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s;
      font-family: 'Orbitron', monospace;
    }

    .nav-links a:hover {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .lang-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 0.35rem 0.9rem;
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.08em;
    }

    .lang-btn:hover {
      background: var(--accent);
      color: var(--navy);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      padding: 9rem 3rem 3rem;
      overflow: hidden;
    }

    .scanline {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
      animation: scanline 5s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 650px;
    }

    .hero-tag {
      display: inline-block;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.65rem;
      padding: 0.3rem 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      font-family: 'Orbitron', monospace;
      animation: fadeUp 0.6s ease both;
      background: rgba(0, 212, 255, 0.06);
    }

    .hero-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.2rem, 5.5vw, 4.2rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 0.4rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero-name span {
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
    }

    .hero-subtitle {
      font-size: 0.9rem;
      color: var(--accent2);
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
      animation: fadeUp 0.6s 0.2s ease both;
      font-family: 'Orbitron', monospace;
    }

    .hero-desc {
      font-size: 0.92rem;
      line-height: 1.85;
      color: rgba(232, 244, 253, 0.8);
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .btn-p {
      background: var(--accent);
      color: var(--navy);
      padding: 0.75rem 1.8rem;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      border: none;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
      font-weight: 700;
    }

    .btn-p:hover {
      background: var(--white);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    .btn-o {
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.75rem 1.8rem;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      background: rgba(0, 212, 255, 0.05);
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-o:hover {
      background: rgba(0, 212, 255, 0.15);
    }

    .hero-photo-wrap {
      position: absolute;
      right: 4rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      animation: float 5s ease-in-out infinite;
    }

    .hero-photo {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      border: 2px solid var(--accent);
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.35);
      animation: glow 3s ease-in-out infinite;
    }

    .hero-ring {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 1px solid rgba(0, 212, 255, 0.25);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 20s linear infinite;
    }

    .hero-ring2 {
      position: absolute;
      width: 345px;
      height: 345px;
      border: 1px dashed rgba(0, 212, 255, 0.1);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 35s linear infinite reverse;
    }

    .hero-stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 2.5rem;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .stat-num {
      font-family: 'Orbitron', monospace;
      font-size: 1.7rem;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent);
    }

    .stat-lbl {
      font-size: 0.65rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* SECTIONS — glass cards on top of the bg */
    section {
      padding: 5rem 3rem;
      position: relative;
      z-index: 2;
    }

    .sec-inner {
      background: rgba(2, 11, 24, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 2.5rem;
      border-radius: 2px;
    }

    .sec-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.62rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .sec-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      font-weight: 700;
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
    }

    .sec-title::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 40px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* SKILLS */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }

    .skill-card {
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid var(--border);
      padding: 1.4rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .skill-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .skill-card:hover::before {
      transform: scaleX(1);
    }

    .skill-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.12);
      transform: translateY(-3px);
    }

    .skill-cat {
      font-family: 'Orbitron', monospace;
      font-size: 0.58rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .skill-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.7rem;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .stag {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      color: var(--accent2);
      font-size: 0.67rem;
      padding: 0.18rem 0.6rem;
    }

    /* TIMELINE */
    .timeline {
      position: relative;
      padding-left: 2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, var(--accent), transparent);
    }

    .titem {
      position: relative;
      margin-bottom: 2.2rem;
      padding-left: 2rem;
      opacity: 0;
      transform: translateX(-20px);
      transition: all 0.5s ease;
    }

    .titem.vis {
      opacity: 1;
      transform: translateX(0);
    }

    .tdot {
      position: absolute;
      left: -2.4rem;
      top: 0.3rem;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    .tdate {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }

    .trole {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.12rem;
    }

    .tco {
      font-size: 0.82rem;
      color: var(--accent2);
      margin-bottom: 0.6rem;
    }

    .tbuls {
      list-style: none;
    }

    .tbuls li {
      font-size: 0.82rem;
      color: rgba(232, 244, 253, 0.75);
      padding-left: 1rem;
      position: relative;
      line-height: 1.6;
      margin-bottom: 0.25rem;
    }

    .tbuls li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* CERTIFICATES */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .cert-card {
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid var(--border);
      padding: 1.4rem;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .cert-card:hover {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.15);
      transform: translateY(-3px);
    }

    .cert-icon {
      font-size: 1.6rem;
    }

    .cert-name {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .cert-issuer {
      font-size: 0.73rem;
      color: var(--accent);
    }

    .cert-date {
      font-size: 0.68rem;
      color: var(--gray);
    }

    .cert-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.25);
      color: var(--gold);
      font-size: 0.65rem;
      padding: 0.18rem 0.55rem;
      width: fit-content;
      font-family: 'Orbitron', monospace;
    }

    .cert-img-card {
      border: 1px solid var(--border);
      overflow: hidden;
      background: rgba(0, 212, 255, 0.04);
    }

    .cert-img-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .cert-img-name {
      padding: 0.6rem;
      font-size: 0.8rem;
    }

    .cert-upload-card {
      border: 1px dashed var(--border);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.3s;
      min-height: 140px;
      text-align: center;
      background: rgba(0, 212, 255, 0.02);
    }

    .cert-upload-card:hover {
      border-color: var(--accent);
      background: rgba(0, 212, 255, 0.06);
    }

    /* PROJECTS */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }

    .proj-card {
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid var(--border);
      padding: 1.6rem;
      transition: all 0.3s;
    }

    .proj-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.12);
    }

    .proj-icon {
      font-size: 1.6rem;
      margin-bottom: 0.7rem;
    }

    .proj-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 0.45rem;
      line-height: 1.4;
    }

    .proj-desc {
      font-size: 0.8rem;
      color: var(--gray);
      line-height: 1.6;
      margin-bottom: 0.7rem;
    }

    .ptags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .ptag {
      background: rgba(31, 78, 121, 0.5);
      color: var(--accent2);
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
    }

    /* EDUCATION */
    .edu-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .edu-card {
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid var(--border);
      padding: 1.4rem;
      display: flex;
      gap: 1.2rem;
      align-items: center;
      transition: all 0.3s;
    }

    .edu-card:hover {
      border-color: var(--accent);
    }

    .edu-icon {
      width: 44px;
      height: 44px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .edu-deg {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 0.22rem;
    }

    .edu-sch {
      font-size: 0.8rem;
      color: var(--accent2);
      margin-bottom: 0.12rem;
    }

    .edu-dates {
      font-size: 0.68rem;
      color: var(--gray);
      font-family: 'Orbitron', monospace;
    }

    /* CHATBOT */
    .chat-wrap {
      max-width: 680px;
      margin: 0 auto;
      border: 1px solid var(--border);
      background: rgba(2, 11, 24, 0.92);
      backdrop-filter: blur(20px);
    }

    .chat-head {
      padding: 0.9rem 1.3rem;
      background: rgba(0, 212, 255, 0.06);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .chat-av {
      width: 32px;
      height: 32px;
      background: rgba(0, 212, 255, 0.12);
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
    }

    .chat-bname {
      font-family: 'Orbitron', monospace;
      font-size: 0.78rem;
      color: var(--accent);
    }

    .chat-status {
      font-size: 0.67rem;
      color: var(--gray);
    }

    .cdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 4px;
      animation: blink 2s infinite;
    }

    .chat-msgs {
      height: 340px;
      overflow-y: auto;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .chat-msgs::-webkit-scrollbar {
      width: 3px;
    }

    .chat-msgs::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .cmsg {
      display: flex;
      gap: 0.6rem;
      animation: msgIn 0.3s ease;
    }

    .cmsg.user {
      flex-direction: row-reverse;
    }

    .cbub {
      max-width: 78%;
      padding: 0.7rem 0.95rem;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .cmsg.bot .cbub {
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid var(--border);
    }

    .cmsg.user .cbub {
      background: rgba(0, 212, 255, 0.18);
      border: 1px solid var(--accent);
    }

    .cmsg-av {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      background: rgba(0, 212, 255, 0.07);
      border: 1px solid var(--border);
    }

    .chat-qs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0 1.1rem 0.7rem;
    }

    .cq {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--accent2);
      font-size: 0.68rem;
      padding: 0.28rem 0.7rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Exo 2', sans-serif;
    }

    .cq:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: var(--accent);
    }

    .chat-in-area {
      padding: 0.7rem 1.1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
    }

    .chat-in {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem;
      font-family: 'Exo 2', sans-serif;
      outline: none;
      transition: border-color 0.3s;
    }

    .chat-in:focus {
      border-color: var(--accent);
    }

    .chat-in::placeholder {
      color: var(--gray);
    }

    .chat-send {
      background: var(--accent);
      border: none;
      color: var(--navy);
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .chat-send:hover {
      background: var(--white);
    }

    .typing-ind {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .tdot2 {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.2s infinite;
    }

    .tdot2:nth-child(2) {
      animation-delay: 0.2s;
    }

    .tdot2:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* CONTACT */
    .contact-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .contact-card {
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid var(--border);
      padding: 1.3rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--white);
      min-width: 160px;
    }

    .contact-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
      transform: translateY(-4px);
    }

    .contact-icon {
      font-size: 1.3rem;
    }

    .contact-lbl {
      font-size: 0.6rem;
      color: var(--gray);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Orbitron', monospace;
    }

    .contact-val {
      font-size: 0.78rem;
      color: var(--accent);
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--gray);
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.08em;
      background: rgba(2, 11, 24, 0.7);
    }

    @media(max-width:900px) {
      .top-bar {
        padding: 0.3rem 1rem;
        gap: 1rem;
      }

      .top-contact {
        font-size: 0.62rem;
      }

      .nav {
        padding: 0.8rem 1.2rem;
        top: 28px;
      }

      .nav-links {
        display: none;
      }

      .hero {
        padding: 8rem 1.2rem 3rem;
      }

      .hero-photo-wrap {
        display: none;
      }

      section {
        padding: 3rem 1rem;
      }

      .sec-inner {
        padding: 1.5rem;
      }
    }
  </style>
</head>

    function Cursor() {

        document.addEventListener('mousemove', move);
        const scroll = () => { const p = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100; document.getElementById('sbar').style.width = p + '%'; };
        window.addEventListener('scroll', scroll);
        return () => { document.removeEventListener('mousemove', move); window.removeEventListener('scroll', scroll); };
      }, []);
      return null;
    }

        obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return (
        <div className="titem" ref={ref}>
          <div className="tdot"></div>
          <div className="tdate">{item.date}</div>
          <div className="trole">{item.role[lang]}</div>
          <div className="tco">{item.company}</div>

        </div>
      );

    function Chatbot({ lang, d }) {
      const [msgs, setMsgs] = useState([{ role: 'bot', text: d.welcome }]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const msgsRef = useRef();
      useEffect(() => { if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight; }, [msgs, loading]);
      useEffect(() => { setMsgs(prev => [{ role: 'bot', text: d.welcome }, ...prev.slice(1)]); }, [lang]);
      const send = async (text) => {
        if (!text.trim() || loading) return;
        setInput('');
        setMsgs(prev => [...prev, { role: 'user', text }]);
        setLoading(true);
        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: ARBAZ_CONTEXT, messages: [{ role: 'user', content: text }] }) });
          const data = await res.json();
          setMsgs(prev => [...prev, { role: 'bot', text: data.content[0].text }]);
        } catch (e) {
          setMsgs(prev => [...prev, { role: 'bot', text: lang === 'sv' ? 'Tyvärr kunde jag inte ansluta. Kontakta Arbaz på arbazhussain067@gmail.com' : 'Sorry, connection error. Contact Arbaz at arbazhussain067@gmail.com' }]);

        setLoading(false);
      };
      return (
        <div className="chat-wrap">

            <div>
              <div className="chat-bname">{lang === 'sv' ? "Arbaz's AI-assistent" : "Arbaz's AI Assistant"}</div>

                <div className="cbub" style={{ whiteSpace: 'pre-wrap' }}>{m.text}</div>
              </div>
            ))}

          </div>
          <div className="chat-qs">{d.qs.map((q, i) => <button key={i} className="cq" onClick={() => send(q)}>{q}</button>)}</div>
          <div className="chat-in-area">
            <input className="chat-in" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send(input)} placeholder={d.placeholder} />
            <button className="chat-send" onClick={() => send(input)}>➤</button>
          </div>
        </div>
      );
